name: Self-Trigger Loop

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  loop-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install

      - name: Mandatory gate
        run: |
          npm run test:v1-summary
          npm run test:v1-cli
          npm run test:v1-e2e
          npm run test:orchestrator

      - name: Generate loop report
        run: npx tsx ops/automation/selfTriggerLoopReport.ts

      - name: Commit report update (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/reports/self-trigger-loop-latest.md
          git diff --cached --quiet || git commit -m "chore(loop): update self-trigger report"
          git push || true
