name: Nurse - Live Health Round

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  live-health-round:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Execute live health round
        env:
          YESNO_LIVE_URL: https://yes-no-kappa.vercel.app
        run: npm run nurse:live-health-round
